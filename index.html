<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurolytics AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #020617;
  color: white;
}

/* HERO BACKGROUND IMAGE */
.hero {
  height: 100vh;
  background: url('logo.png') no-repeat center;
  background-size: contain;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background-color: #020617;
}

/* DARK OVERLAY */
.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(2,6,23,0.85);
  top: 0;
  left: 0;
}

.hero-content {
  position: relative;
  text-align: center;
}

nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  align-items: center;
}

.logo img {
  height: 40px;
}

.btn {
  background: linear-gradient(45deg,#3b82f6,#6366f1);
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  color: white;
  cursor: pointer;
}

/* SECTIONS */
.section {
  padding: 80px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 12px;
  width: 250px;
}

footer {
  text-align: center;
  padding: 30px;
  color: gray;
}
</style>
</head>

<body>

<nav>
  <div class="logo">
    <img src="logo.png" alt="Neurolytics AI Logo">
  </div>
  <button class="btn">Get Quote</button>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>AI & Data Solutions for Modern Businesses</h1>
    <p>We turn data into intelligent business decisions</p>
    <button class="btn">Book Free Consultation</button>
  </div>
</section>

<section class="section">
  <h2>Our Services</h2>
  <div class="cards">
    <div class="card">AI Development</div>
    <div class="card">Data Analytics</div>
    <div class="card">Machine Learning</div>
    <div class="card">Data Annotation</div>
  </div>
</section>

<footer>
  © 2026 Neurolytics AI
</footer>

</body>
</html>
